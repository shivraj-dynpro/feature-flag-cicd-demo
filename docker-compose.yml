# App only. Run with:  docker compose up --build
services:
  app:
    build: .
    image: feature-flag-demo:latest
    container_name: feature-flag-app
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
