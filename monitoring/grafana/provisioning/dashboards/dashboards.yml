# Auto-load dashboards from a folder (the JSON files are mounted separately).
apiVersion: 1

providers:
  - name: Feature Flag Demo
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
